###
# Configure the wake model.
wake:

  ###
  # Select the models to use for the simulation.
  # See :py:mod:`~.wake` for a list
  # of available models and their descriptions.
  model_strings:

    ###
    # Wind farm model to use (PropagateDownwind, PropagateDownWindIterative, or All2AllIterative)
    wind_farm_model: PropagateDownwind

    ### 
    # Deficit model to use (IEA37SimpleBastankhahGaussian, BastankhahGaussian, NOJDeficit, TurboNOJDeficit, GCLDeficit)
    deficit_model: BlondelSuperGaussianDeficit2020
    
    ###
    # Optional wake deflection model
    deflection_model: JimenezWakeDeflection

    ###
    # Optional turbulence model (CrespoHernandez, STF2017TurbulenceModel, or null)
    turbulence_model: CrespoHernandez

    ###
    # Select superposition model for multiple wakes(LinearSum, SquaredSum, MaxSum, WeightedSum, SqMaxSum)
    superposition_model: SquaredSum

    ###
    # Select rotor averaging model (RotorCenter, GridRotorAvg, EqGridRotorAvg, GQGridRotorAvg, PolarGridRotorAvg, CGIRotorAvg, or None)
    rotor_avg_model: CGIRotorAvg(9)

    ###
    # Select site object to use (UniformSite, WeibullSite, or UniformWeibullSite, etc.)
    site: UniformSite

  ###
  # Configure the parameters for the wake deflection model
  # selected above.
  # Additional blocks can be provided for
  # models that are not enabled, but the enabled model
  # must have a corresponding parameter block.
  wake_deflection_parameters:
    gauss:
      ad: 0.0
      alpha: 0.58
      bd: 0.0
      beta: 0.077
      dm: 1.0
      ka: 0.38
      kb: 0.004
    jimenez:
      ad: 0.0
      bd: 0.0
      kd: 0.05

  ###
  # Configure the parameters for the wake velocity deficit model
  # selected above.
  # Additional blocks can be provided for
  # models that are not enabled, but the enabled model
  # must have a corresponding parameter block.
  wake_velocity_parameters:
    gauss:
      alpha: 0.58
      beta: 0.077
      ka: 0.38
      kb: 0.004
    jensen:
      we: 0.05

  ###
  # Configure the parameters for the wake turbulence model
  # selected above.
  # Additional blocks can be provided for
  # models that are not enabled, but the enabled model
  # must have a corresponding parameter block.
  wake_turbulence_parameters:
    crespo_hernandez:
      initial: 0.1
      constant: 0.5
      ai: 0.8
      downstream: -0.32
